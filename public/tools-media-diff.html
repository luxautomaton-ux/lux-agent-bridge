<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Media & Diff</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg-deep); font-family: var(--font-sans); color: var(--text-primary); }
    .app-layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
    .sidebar { background: var(--bg-surface); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; padding: 16px; }
    .sidebar-logo { padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px; }
    .sidebar-logo img { height: 40px; width: auto; display: block; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-section { margin-bottom: 16px; }
    .nav-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; padding: 0 12px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-link.active { background: rgba(0,212,170,0.15); color: var(--accent-primary); }
    .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border-subtle); }
    .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); }
    .status-dot { width: 8px; height: 8px; background: var(--accent-primary); border-radius: 50%; box-shadow: 0 0 8px var(--accent-primary); }
    .main-content { padding: 32px 40px; overflow-y: auto; max-width: 1200px; margin: 0 auto; width: 100%; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-header .subtitle { font-size: 14px; color: var(--text-secondary); }
    .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .form-input, .form-textarea { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 12px; color: var(--text-primary); font-size: 14px; }
    .form-textarea { min-height: 100px; resize: vertical; font-family: var(--font-mono); }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; margin-bottom: 16px; }
    .btn-primary { background: var(--gradient-glow); color: var(--bg-deep); }
    .terminal { background: var(--bg-deep); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); white-space: pre-wrap; min-height: 100px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="/photos/Lux Automaton.png" alt="Lux Agent" /></div>
      <nav class="sidebar-nav">
        <div class="nav-section"><div class="nav-section-title">Tools</div>
          <a class="nav-link" href="/tools-storage.html">⛃ Storage</a>
          <a class="nav-link active" href="/tools-media-diff.html">◈ Media & Diff</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">System</div>
          <a class="nav-link" href="/workspace.html">⌂ Hub</a>
        </div>
      </nav>
      <div class="sidebar-footer"><div class="status-row"><span>v1.0.0</span><span class="status-dot"></span></div></div>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Media & Diff Viewer</h1><p class="subtitle">Analyze media files and compare code</p></div>
      <div class="card">
        <div class="card-title">Media Analysis</div>
        <div class="form-group">
          <label class="form-label">File URL</label>
          <input id="mediaInput" class="form-input" placeholder="https://..." />
        </div>
        <button id="analyze" class="btn btn-primary">Analyze</button>
        <pre id="mediaOut" class="terminal"></pre>
      </div>
      <div class="card">
        <div class="card-title">Diff Viewer</div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Original</label>
            <textarea id="original" class="form-textarea" placeholder="Original content..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Modified</label>
            <textarea id="modified" class="form-textarea" placeholder="Modified content..."></textarea>
          </div>
        </div>
        <button id="diff" class="btn btn-primary">Compare</button>
        <pre id="diffOut" class="terminal"></pre>
      </div>
    </main>
  </div>
  <script src="/lux-core.js"></script>
  <script>
    document.getElementById('analyze').onclick = async () => { try { const r = await luxApi('/api/media/analyze', { method: 'POST', body: JSON.stringify({ input: document.getElementById('mediaInput').value }) }); document.getElementById('mediaOut').textContent = JSON.stringify(r, null, 2); } catch (e) { document.getElementById('mediaOut').textContent = e.message; } };
    document.getElementById('diff').onclick = async () => { try { const r = await luxApi('/api/diff', { method: 'POST', body: JSON.stringify({ original: document.getElementById('original').value, modified: document.getElementById('modified').value }) }); document.getElementById('diffOut').textContent = r.diff || JSON.stringify(r, null, 2); } catch (e) { document.getElementById('diffOut').textContent = e.message; } };
  </script>
</body>
</html>
