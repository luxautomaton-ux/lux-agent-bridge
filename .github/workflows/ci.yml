name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Smoke test
        run: |
          npm start &
          sleep 5
          curl -s http://localhost:8787/api/health | grep -q "online" && echo "Health OK"
          kill %1 || true

      - name: Validate
        run: bash scripts/smoke-test.sh || true